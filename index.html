<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Empréstimos Premium</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
</head>
<body class="dark-theme">
    <script>checkSession();</script>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>LoanAdmin</h2>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-btn active" id="btn-inicio">Início</button>
                <button class="nav-btn" id="btn-config">Configurações</button>
                <button class="nav-btn" id="btn-logout" onclick="logout()" style="color: #ff4d4d; margin-top: auto;">Sair</button>
            </nav>
            <div class="sidebar-footer">
                <div class="theme-selector">
                    <select id="theme-select">
                        <option value="dark">Dark</option>
                        <option value="light">Light</option>
                    </select>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <h1>Painel de Controle de Empréstimos</h1>
            </header>

            <section class="form-container">
                <div class="input-grid">
                    <div class="input-group">
                        <label for="cliente-nome">Nome do Cliente:</label>
                        <input type="text" id="cliente-nome" placeholder="Digite o nome completo">
                    </div>
                    <div class="input-group">
                        <label for="cliente-telefone">Telefone (WhatsApp):</label>
                        <input type="text" id="cliente-telefone" placeholder="(00) 00000-0000">
                    </div>
                    <div class="input-group">
                        <label for="valor-pego">Valor Pego (R$):</label>
                        <input type="number" id="valor-pego" placeholder="0,00">
                    </div>
                    <div class="input-group">
                        <label for="valor-juros">Juros (%):</label>
                        <input type="number" id="valor-juros" placeholder="0%">
                    </div>
                    <div class="input-group">
                        <label for="data-pagamento">Data de Pagamento:</label>
                        <input type="date" id="data-pagamento">
                    </div>
                </div>
                <div class="form-actions">
                    <button id="add-client-btn" class="primary-btn">Adicionar Novo Cliente</button>
                </div>
            </section>

            <section class="list-container">
                <div id="expiration-alerts" class="alerts-bar"></div>
                <div class="list-header">
                    <h3>Empréstimos Registrados</h3>
                </div>
                <div class="table-wrapper">
                    <table id="loan-table">
                        <thead>
                            <tr>
                                <th>Cliente</th>
                                <th>Telefone</th>
                                <th>Valor Pego</th>
                                <th>Juros</th>
                                <th>Total a Pagar</th>
                                <th>Data Pagto.</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="loan-list">
                            <!-- Items will be added here -->
                        </tbody>
                    </table>
                    <div id="empty-state" class="empty-state">
                        Nenhum empréstimo registrado ainda.
                    </div>
                </div>
            </section>

            <footer class="content-footer">
                <button class="success-btn" id="generate-report-btn">Gerar Relatório PDF</button>
            </footer>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
