<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WAEMPRESTIMO Cloud</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="dark-theme">
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <img src="logo.png" alt="WAEMPRESTIMO Logo" class="app-logo-small">
                <h1>WAEMPRESTIMO</h1>
            </div>
            <p>Gerenciamento de Empréstimos na Nuvem</p>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Senha:</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="login-actions">
                    <button type="submit" id="btn-login" class="primary-btn">Entrar</button>
                    <button type="button" id="btn-register" class="nav-btn">Criar Conta</button>
                </div>
                <div id="login-error" class="error-msg"></div>
            </form>
        </div>
    </div>

    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-dark);
        }
        .login-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .app-logo-small {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-blue);
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.2);
        }
        .login-box {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .login-box h1 { margin-bottom: 0.5rem; color: var(--primary-blue); }
        .login-box p { margin-bottom: 2rem; color: var(--text-secondary); font-size: 0.9rem; }
        .login-actions { display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem; }
        .error-msg { color: #ff4d4d; margin-top: 1rem; font-size: 0.85rem; display: none; }
    </style>

    <script src="config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
